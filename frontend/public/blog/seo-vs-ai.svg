<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" fill="none">
  <rect width="800" height="300" rx="16" fill="#fafaf9"/>

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" font-family="system-ui,sans-serif" font-size="15" font-weight="600" fill="#1c1917">傳統 SEO vs AI 可見度：你可能只做了一半</text>

  <!-- Left: Traditional SEO -->
  <rect x="32" y="60" width="360" height="220" rx="12" fill="#fff" stroke="#e7e2dc" stroke-width="1.5"/>
  <rect x="32" y="60" width="360" height="36" rx="12" fill="#f5f3f0"/>
  <text x="212" y="84" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#57534e">傳統 SEO</text>

  <text x="56" y="120" font-family="system-ui,sans-serif" font-size="12" fill="#16a34a">✓</text>
  <text x="76" y="120" font-family="system-ui,sans-serif" font-size="12" fill="#57534e">Title Tag / Meta Description</text>
  <text x="56" y="146" font-family="system-ui,sans-serif" font-size="12" fill="#16a34a">✓</text>
  <text x="76" y="146" font-family="system-ui,sans-serif" font-size="12" fill="#57534e">關鍵字優化</text>
  <text x="56" y="172" font-family="system-ui,sans-serif" font-size="12" fill="#16a34a">✓</text>
  <text x="76" y="172" font-family="system-ui,sans-serif" font-size="12" fill="#57534e">外部連結 / Domain Authority</text>
  <text x="56" y="198" font-family="system-ui,sans-serif" font-size="12" fill="#16a34a">✓</text>
  <text x="76" y="198" font-family="system-ui,sans-serif" font-size="12" fill="#57534e">Sitemap / Canonical URL</text>
  <text x="56" y="224" font-family="system-ui,sans-serif" font-size="12" fill="#16a34a">✓</text>
  <text x="76" y="224" font-family="system-ui,sans-serif" font-size="12" fill="#57534e">Page Speed / Core Web Vitals</text>

  <rect x="56" y="244" width="312" height="24" rx="6" fill="#16a34a" opacity="0.08"/>
  <text x="212" y="261" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#16a34a">Google 搜得到 ✓</text>

  <!-- Right: AI Visibility -->
  <rect x="408" y="60" width="360" height="220" rx="12" fill="#fff" stroke="#0d7377" stroke-width="1.5" stroke-opacity="0.3"/>
  <rect x="408" y="60" width="360" height="36" rx="12" fill="#0d7377" opacity="0.06"/>
  <text x="588" y="84" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#0d7377">AI 可見度（你還缺的）</text>

  <text x="432" y="120" font-family="system-ui,sans-serif" font-size="12" fill="#dc2626">✗</text>
  <text x="452" y="120" font-family="system-ui,sans-serif" font-size="12" fill="#57534e">JSON-LD Product Schema</text>
  <text x="652" y="120" font-family="ui-monospace,monospace" font-size="9" fill="#a8a29e" font-weight="500">— 最重要</text>
  <text x="432" y="146" font-family="system-ui,sans-serif" font-size="12" fill="#dc2626">✗</text>
  <text x="452" y="146" font-family="system-ui,sans-serif" font-size="12" fill="#57534e">robots.txt 允許 AI 爬蟲</text>
  <text x="432" y="172" font-family="system-ui,sans-serif" font-size="12" fill="#dc2626">✗</text>
  <text x="452" y="172" font-family="system-ui,sans-serif" font-size="12" fill="#57534e">llms.txt 網站描述檔</text>
  <text x="432" y="198" font-family="system-ui,sans-serif" font-size="12" fill="#dc2626">✗</text>
  <text x="452" y="198" font-family="system-ui,sans-serif" font-size="12" fill="#57534e">aggregateRating / brand / gtin</text>
  <text x="432" y="224" font-family="system-ui,sans-serif" font-size="12" fill="#dc2626">✗</text>
  <text x="452" y="224" font-family="system-ui,sans-serif" font-size="12" fill="#57534e">伺服器端渲染（SSR）</text>

  <rect x="432" y="244" width="312" height="24" rx="6" fill="#dc2626" opacity="0.06"/>
  <text x="588" y="261" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#dc2626">ChatGPT / Perplexity 搜不到 ✗</text>
</svg>
