<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 280" fill="none">
  <rect width="800" height="280" rx="16" fill="#fafaf9"/>

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" font-family="system-ui,sans-serif" font-size="15" font-weight="600" fill="#1c1917">加上結構化資料後，AI 可見度分數的變化</text>

  <!-- Before -->
  <rect x="48" y="60" width="320" height="196" rx="12" fill="#fff" stroke="#e7e2dc" stroke-width="1.5"/>

  <!-- Before header -->
  <rect x="48" y="60" width="320" height="36" rx="12" fill="#dc2626" opacity="0.05"/>
  <text x="208" y="83" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#dc2626">修復前</text>

  <!-- Before score circle -->
  <circle cx="132" cy="168" r="52" fill="none" stroke="#e7e2dc" stroke-width="8"/>
  <circle cx="132" cy="168" r="52" fill="none" stroke="#dc2626" stroke-width="8" stroke-dasharray="327" stroke-dashoffset="213" stroke-linecap="round" transform="rotate(-90 132 168)"/>
  <text x="132" y="162" text-anchor="middle" font-family="system-ui,sans-serif" font-size="28" font-weight="700" fill="#dc2626">35</text>
  <text x="132" y="182" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#a8a29e">/130 pts</text>

  <!-- Before details -->
  <text x="210" y="126" font-family="system-ui,sans-serif" font-size="11" fill="#a8a29e">AI 爬蟲可及性</text>
  <text x="340" y="126" text-anchor="end" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#ca8a04">20/30</text>
  <rect x="210" y="132" width="140" height="4" rx="2" fill="#e7e2dc"/>
  <rect x="210" y="132" width="93" height="4" rx="2" fill="#ca8a04"/>

  <text x="210" y="160" font-family="system-ui,sans-serif" font-size="11" fill="#a8a29e">結構化資料</text>
  <text x="340" y="160" text-anchor="end" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#dc2626">10/80</text>
  <rect x="210" y="166" width="140" height="4" rx="2" fill="#e7e2dc"/>
  <rect x="210" y="166" width="17" height="4" rx="2" fill="#dc2626"/>

  <text x="210" y="194" font-family="system-ui,sans-serif" font-size="11" fill="#a8a29e">進階優化</text>
  <text x="340" y="194" text-anchor="end" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#dc2626">5/20</text>
  <rect x="210" y="200" width="140" height="4" rx="2" fill="#e7e2dc"/>
  <rect x="210" y="200" width="35" height="4" rx="2" fill="#dc2626"/>

  <text x="208" y="238" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#dc2626" font-weight="500">AI 搜尋引擎幾乎不會推薦</text>

  <!-- Arrow -->
  <path d="M388 160 L412 160" stroke="#0d7377" stroke-width="3" marker-end="url(#arrowG)"/>

  <!-- After -->
  <rect x="432" y="60" width="320" height="196" rx="12" fill="#fff" stroke="#0d7377" stroke-width="1.5" stroke-opacity="0.3"/>

  <!-- After header -->
  <rect x="432" y="60" width="320" height="36" rx="12" fill="#16a34a" opacity="0.06"/>
  <text x="592" y="83" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#16a34a">修復後</text>

  <!-- After score circle -->
  <circle cx="516" cy="168" r="52" fill="none" stroke="#e7e2dc" stroke-width="8"/>
  <circle cx="516" cy="168" r="52" fill="none" stroke="#16a34a" stroke-width="8" stroke-dasharray="327" stroke-dashoffset="75" stroke-linecap="round" transform="rotate(-90 516 168)"/>
  <text x="516" y="162" text-anchor="middle" font-family="system-ui,sans-serif" font-size="28" font-weight="700" fill="#16a34a">105</text>
  <text x="516" y="182" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#a8a29e">/130 pts</text>

  <!-- After details -->
  <text x="594" y="126" font-family="system-ui,sans-serif" font-size="11" fill="#a8a29e">AI 爬蟲可及性</text>
  <text x="724" y="126" text-anchor="end" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#16a34a">30/30</text>
  <rect x="594" y="132" width="140" height="4" rx="2" fill="#e7e2dc"/>
  <rect x="594" y="132" width="140" height="4" rx="2" fill="#16a34a"/>

  <text x="594" y="160" font-family="system-ui,sans-serif" font-size="11" fill="#a8a29e">結構化資料</text>
  <text x="724" y="160" text-anchor="end" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#16a34a">60/80</text>
  <rect x="594" y="166" width="140" height="4" rx="2" fill="#e7e2dc"/>
  <rect x="594" y="166" width="105" height="4" rx="2" fill="#16a34a"/>

  <text x="594" y="194" font-family="system-ui,sans-serif" font-size="11" fill="#a8a29e">進階優化</text>
  <text x="724" y="194" text-anchor="end" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#16a34a">15/20</text>
  <rect x="594" y="200" width="140" height="4" rx="2" fill="#e7e2dc"/>
  <rect x="594" y="200" width="105" height="4" rx="2" fill="#16a34a"/>

  <text x="592" y="238" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#16a34a" font-weight="500">AI 搜尋引擎很可能會推薦你的商品</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrowG" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="10" markerHeight="10" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0d7377"/>
    </marker>
  </defs>
</svg>
